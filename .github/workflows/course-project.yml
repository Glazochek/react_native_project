name: CourseProject

on:
  push:
    branches: [main, master]
    paths:
      - CourseProject/**
      - .github/workflows/course-project.yml
  pull_request:
    paths:
      - CourseProject/**
      - .github/workflows/course-project.yml
  workflow_dispatch:

defaults:
  run:
    working-directory: CourseProject

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
          cache-dependency-path: CourseProject/package-lock.json
      - run: npm ci
      - run: npm run lint-typecheck
      - run: npm run lint-eslint
      - run: npm run lint-prettier
      - run: npm run lint-knip
      - run: npm run test

  eas-build:
    needs: lint-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
          cache-dependency-path: CourseProject/package-lock.json
      - uses: expo/expo-github-action@v8
        with:
          eas-version: 20.0.0
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm ci
      - run: npx eas-cli@20.0.0 build --platform android --profile preview --non-interactive
